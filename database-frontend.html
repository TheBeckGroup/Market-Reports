<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions Database</title>
    <!-- Favicon link -->
    <link rel="icon" type="image/png" href="becklogo64.png">
    <!-- Chart.js for Graphical View -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; color: #4b5563; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        /* App Layout (Sidebar + Main Content) */
        .app-wrapper { display: flex; width: 100%; height: 100%; align-items: stretch; }
        
        /* Sidebar Styling & Collapsing Logic */
        .sidebar { flex: 0 0 280px; width: 280px; background: #ffffff; box-shadow: 2px 0 5px rgba(0,0,0,0.1); height: 100%; overflow-x: hidden; overflow-y: auto; transition: width 0.3s ease, flex 0.3s ease, margin-left 0.3s ease; z-index: 100; display: flex; flex-direction: column; }
        .sidebar.collapsed { flex: 0 0 70px; width: 70px; }
        
        .sidebar-header { display: flex; align-items: center; padding: 20px 20px 10px 20px; border-bottom: 2px solid #e5e7eb; margin-bottom: 15px; min-width: 280px; box-sizing: border-box; }
        .sidebar-header h3 { margin: 0; color: #0033a0; font-size: 18px; margin-left: 15px; transition: opacity 0.3s ease; }
        .sidebar.collapsed .sidebar-header h3 { opacity: 0; pointer-events: none; }
        
        .sidebar-content { padding: 0 20px 20px 20px; min-width: 280px; box-sizing: border-box; flex: 1; transition: opacity 0.3s ease; }
        .sidebar.collapsed .sidebar-content { opacity: 0; pointer-events: none; }
        
        .sidebar-btn { background: #f3f4f6; color: #4b5563; padding: 12px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px; transition: background 0.2s; border: 1px solid #d1d5db; }
        .sidebar-btn:hover { background: #e5e7eb; }
        .sidebar-btn.active { background: #0033a0; color: #fff; border-color: #0033a0; }
        
        .menu-group { margin-bottom: 5px; }
        .menu-item { padding: 10px 15px; cursor: pointer; font-weight: 600; color: #4b5563; border-radius: 4px; transition: background 0.2s; border-left: 4px solid transparent; }
        .menu-item:hover { background: #f9fafb; }
        .menu-item.active { color: #0033a0; background: #eff6ff; border-left-color: #0033a0; }
        
        .sub-menu { display: none; padding-left: 20px; margin-top: 5px; margin-bottom: 10px; }
        .sub-menu.open { display: block; }
        .sub-item { padding: 8px 10px; cursor: pointer; font-size: 13px; color: #6b7280; border-radius: 4px; margin-bottom: 2px; }
        .sub-item:hover { background: #f3f4f6; color: #374151; }
        .sub-item.active { color: #0033a0; font-weight: bold; background: #e0e7ff; }

        /* Main Content Styling */
        .main-scroll-area { flex: 1; height: 100%; overflow-y: auto; padding: 30px 20px; }
        .main-content { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1200px; margin: 0 auto; min-width: 0; }
        
        /* Header Styling */
        .header-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .header-title-group { display: flex; align-items: center; gap: 15px; }
        .toggle-btn { background: none; border: none; font-size: 26px; color: #0033a0; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; min-width: 30px; transition: color 0.2s; }
        .toggle-btn:hover { color: #002270; }
        .header-bar h2 { margin: 0; color: #0033a0; font-size: 24px; }
        .header-bar img { height: 50px; width: auto; object-fit: contain; margin-left: 20px; }
        
        /* Tabs */
        .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .tab-btn { background: transparent; color: #6b7280; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 16px; transition: color 0.2s; white-space: nowrap; }
        .tab-btn:hover { color: #0033a0; }
        .tab-btn.active { color: #0033a0; border-bottom: 3px solid #0033a0; margin-bottom: -2px; }
        
        /* Graphical View Container */
        .chart-placeholder { text-align: center; padding: 60px 20px; background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 8px; margin-bottom: 40px; color: #6b7280; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-bottom: 40px; display: none; flex-direction: column; }
        .chart-inner-wrapper { position: relative; flex: 1; width: 100%; min-height: 0; }
        
        /* Table Styling */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 14px; }
        th, td { padding: 12px 15px; border: 1px solid #e5e7eb; text-align: left; }
        th { background-color: #0033a0; color: white; font-weight: 600; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f9fafb; }
        tr:hover { background-color: #f3f4f6; }
        
        .loading { text-align: center; font-size: 18px; color: #6b7280; padding: 40px; }
        .no-data { text-align: center; color: #6b7280; padding: 20px; font-style: italic; }

        .mobile-toggle { display: none; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .sidebar { position: fixed; left: 0; top: 0; margin-left: -280px; width: 280px; flex: 0 0 280px; }
            .sidebar.mobile-open { margin-left: 0; }
            .mobile-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>
                <h3>Bid Packages</h3>
            </div>
            <div class="sidebar-content">
                <div id="sidebar-menu">
                    <p style="text-align: center; color: #6b7280; font-style: italic; font-size: 14px;">Loading packages...</p>
                </div>
            </div>
        </div>

        <!-- Main Dashboard Content -->
        <div class="main-scroll-area">
            <div class="main-content">
                <div class="header-bar">
                    <div class="header-title-group">
                        <button class="toggle-btn mobile-toggle" onclick="toggleSidebar()" title="Open Menu">☰</button>
                        <h2 id="dashboard-title">Market Conditions</h2>
                    </div>
                    <img src="becklogo.png" alt="Company Logo">
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('unitPricing')">Unit Pricing</button>
                    <button class="tab-btn" onclick="switchTab('leadTimes')">Lead Times</button>
                    <button class="tab-btn" onclick="switchTab('priceEscalation')">Price Escalation</button>
                </div>

                <!-- Graphical Chart Area -->
                <div id="chart-placeholder" class="chart-placeholder" style="display: none;">
                    <span style="font-size: 24px; display: block; margin-bottom: 10px;">📊</span>
                    <strong>Select an Item</strong><br>
                    Please select a specific item from the sidebar on the left to view market trends and variations across regions and time.
                </div>

                <div class="chart-container" id="chart-wrapper">
                    <h3 id="chart-inner-title" style="text-align: left; margin-top: 0; margin-bottom: 15px; font-size: 16px;"></h3>
                    <div class="chart-inner-wrapper">
                        <canvas id="dataChart"></canvas>
                    </div>
                </div>

                <div id="data-container" class="table-container">
                    <p class="loading">Fetching database records...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT DATABASE WEB APP URL HERE ===
        const GAS_DB_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxmdnYzBC-mfx1IpGiDUdpAfELNVnJL0oZ5cYKkbxoB_z-IlRBVBLcNyPlAJXTBjJXX/exec'; 

        let rawData = { unitPricing: [], leadTimes: [], priceEscalation: [] };
        let currentTab = 'unitPricing';
        let myChart = null; 
        
        // State tracking for the sidebar filters
        let activePackageFilter = "";
        let activeItemFilter = "";

        document.addEventListener("DOMContentLoaded", fetchSubmissions);

        // Sidebar Toggle Logic
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 850) {
                sidebar.classList.toggle('mobile-open');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        async function fetchSubmissions() {
            try {
                const response = await fetch(`${GAS_DB_WEB_APP_URL}?action=getSubmissions`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                
                rawData = data;
                renderSidebar();
                applyFilters(); 
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('sidebar-menu').innerHTML = '';
                document.getElementById('data-container').innerHTML = `<p style="color:red; text-align:center;">Failed to connect to the database. Error: ${error.message}</p>`;
            }
        }

        // Draws the interactive sidebar
        function renderSidebar() {
            const packageMap = new Map();

            // Map all packages to their nested items
            ['unitPricing', 'leadTimes', 'priceEscalation'].forEach(tab => {
                rawData[tab].forEach(row => {
                    const pkg = row['BID PACKAGE'];
                    const item = row['ITEM'];
                    if (pkg) {
                        if (!packageMap.has(pkg)) packageMap.set(pkg, new Set());
                        if (item) packageMap.get(pkg).add(item);
                    }
                });
            });

            const sidebar = document.getElementById('sidebar-menu');
            let html = `<div class="sidebar-btn ${activePackageFilter === '' ? 'active' : ''}" onclick="setSidebarFilter('', '')">View All Packages</div>`;

            // Build accordion menu
            Array.from(packageMap.keys()).sort().forEach(pkg => {
                const isPkgActive = activePackageFilter === pkg;
                const safePkg = pkg.replace(/'/g, "\\'").replace(/"/g, '&quot;'); // Escape for HTML JS params
                
                html += `
                    <div class="menu-group">
                        <div class="menu-item ${isPkgActive ? 'active' : ''}" onclick="setSidebarFilter('${safePkg}', '')">${pkg}</div>
                        <div class="sub-menu ${isPkgActive ? 'open' : ''}">
                `;
                
                // Only render items if the package is open to keep HTML clean
                if (isPkgActive) {
                    html += `<div class="sub-item ${activeItemFilter === '' ? 'active' : ''}" onclick="setSidebarFilter('${safePkg}', '')">-- All Items --</div>`;
                    Array.from(packageMap.get(pkg)).sort().forEach(item => {
                        const safeItem = item.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        const isItemActive = activeItemFilter === item;
                        html += `<div class="sub-item ${isItemActive ? 'active' : ''}" onclick="setSidebarFilter('${safePkg}', '${safeItem}')">${item}</div>`;
                    });
                }
                html += `</div></div>`;
            });
            sidebar.innerHTML = html;
        }

        // Handles clicks from the sidebar
        window.setSidebarFilter = function(pkg, item) {
            activePackageFilter = pkg;
            activeItemFilter = item;
            renderSidebar(); // Redraw menu to show active states
            applyFilters();  // Redraw charts and tables
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            applyFilters(); 
        }

        function applyFilters() {
            const currentData = rawData[currentTab];
            
            const filteredData = currentData.filter(row => {
                const matchPackage = !activePackageFilter || row['BID PACKAGE'] === activePackageFilter;
                const matchItem = !activeItemFilter || row['ITEM'] === activeItemFilter;
                
                return matchPackage && matchItem;
            });

            renderChart(filteredData);
            renderTable(filteredData);
        }

        function renderChart(dataArray) {
            const chartWrapper = document.getElementById('chart-wrapper');
            const placeholder = document.getElementById('chart-placeholder');
            const ctx = document.getElementById('dataChart').getContext('2d');
            const titleEl = document.getElementById('dashboard-title');
            
            if (myChart) myChart.destroy();

            // Dynamic Title Updating
            if (activePackageFilter && activeItemFilter) {
                titleEl.textContent = `${activePackageFilter} - ${activeItemFilter}`;
            } else {
                titleEl.textContent = 'Market Conditions';
            }

            // ENFORCE 1-ITEM RULE: If no item is specifically selected, hide chart and prompt the user.
            if (!activeItemFilter) {
                chartWrapper.style.display = 'none';
                if (dataArray && dataArray.length > 0) {
                    placeholder.style.display = 'block';
                } else {
                    placeholder.style.display = 'none';
                }
                return;
            }

            if (!dataArray || dataArray.length === 0) {
                chartWrapper.style.display = 'none';
                placeholder.style.display = 'none';
                return;
            }
            
            placeholder.style.display = 'none';
            chartWrapper.style.display = 'flex'; // Use flex to stack title and chart cleanly

            // Extract dynamic UOM and Quarter for the chart title
            let uom = 'UNIT';
            let quarterStr = '';
            
            if (dataArray.length > 0) {
                const firstRowKeys = Object.keys(dataArray[0]);
                const uomKey = firstRowKeys.find(k => k.toUpperCase().includes('UNIT OF MEASURE') || k.toUpperCase() === 'UOM');
                if (uomKey && dataArray[0][uomKey]) uom = dataArray[0][uomKey];
                
                const qKey = firstRowKeys.find(k => k.toUpperCase().includes('QUARTER'));
                if (qKey) {
                    const uniqueQuarters = new Set();
                    dataArray.forEach(r => { if (r[qKey]) uniqueQuarters.add(r[qKey]); });
                    quarterStr = Array.from(uniqueQuarters).join(' & ');
                }
            }

            const chartInnerTitle = document.getElementById('chart-inner-title');
            let titlePrefix = '';
            
            if (currentTab === 'unitPricing') {
                titlePrefix = `Cost/${uom}`;
            } else if (currentTab === 'leadTimes') {
                titlePrefix = `Lead Time (Weeks)`;
            } else if (currentTab === 'priceEscalation') {
                titlePrefix = `Price Variance (%)`;
            }

            chartInnerTitle.innerHTML = `<span style="color: #0033a0;">${titlePrefix}</span> <span style="color: #4b5563; text-transform: uppercase;">- ${quarterStr || 'All Time'}</span>`;

            // FUZZY DATA MATCHER with Percentage Handling
            const getCleanValue = (row, keywords, isPercent = false) => {
                const keys = Object.keys(row);
                const targetKey = keys.find(k => {
                    const upper = k.toUpperCase();
                    return keywords.every(kw => upper.includes(kw));
                });
                
                if (!targetKey) return 0;
                
                const val = row[targetKey];
                if (val === undefined || val === null || val === '') return 0;
                
                // Strip all non-numeric characters (like '$', '%', ',') before parsing
                let parsed = parseFloat(String(val).replace(/[^0-9.-]+/g, ""));
                if (isNaN(parsed)) return 0;

                // Fix: Google Sheets translates percentage formatted columns to decimals under the hood (e.g. 5% -> 0.05).
                // If it is supposed to be a percent, and it looks like a decimal fraction, correct it.
                if (isPercent && Math.abs(parsed) <= 1 && parsed !== 0 && !String(val).includes('%')) {
                    parsed = parsed * 100;
                }

                return parsed;
            };

            const labels = [];
            const lowData = [];
            const highData = [];
            const leadData = [];
            const varData = [];

            // Plot individual submissions (since we are locked to 1 item)
            dataArray.forEach(row => {
                const region = row['REGION'] || 'No Region';
                const quarter = row['QUARTER'] || '';
                
                // Label formats dynamically (Company removed from X-axis as requested)
                labels.push(quarter ? `${region} | ${quarter}` : region);
                
                if (currentTab === 'unitPricing') {
                    let low = getCleanValue(row, ['LOW', 'RANGE']);
                    if (low === 0) low = getCleanValue(row, ['SUBMITTED', 'LOW']); 
                    if (low === 0) low = getCleanValue(row, ['LOW', 'PRICE']); 
                    
                    let high = getCleanValue(row, ['HIGH', 'RANGE']);
                    if (high === 0) high = getCleanValue(row, ['SUBMITTED', 'HIGH']); 
                    if (high === 0) high = getCleanValue(row, ['HIGH', 'PRICE']); 
                    
                    lowData.push(low);
                    highData.push(high);
                } else if (currentTab === 'leadTimes') {
                    let lead = getCleanValue(row, ['LEAD', 'TIME']);
                    if (lead === 0) lead = getCleanValue(row, ['SUBMITTED', 'LEAD']); 
                    
                    leadData.push(lead);
                } else if (currentTab === 'priceEscalation') {
                    // Pass true to flag this as a percentage that might need decimal correction
                    let variance = getCleanValue(row, ['VARIANCE'], true);
                    if (variance === 0) variance = getCleanValue(row, ['ESCALATION'], true); 
                    
                    varData.push(variance);
                }
            });

            const datasets = [];

            if (currentTab === 'unitPricing') {
                // Stacked points (scatter/line approach without drawing the connection lines)
                datasets.push({
                    type: 'line',
                    showLine: false,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    label: 'Low Range',
                    data: lowData,
                    backgroundColor: '#4b5563', 
                    borderColor: '#4b5563',
                    datalabels: { align: 'bottom', anchor: 'start' }
                });
                datasets.push({
                    type: 'line',
                    showLine: false,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    label: 'High Range',
                    data: highData,
                    backgroundColor: '#0033a0', 
                    borderColor: '#0033a0',
                    datalabels: { align: 'top', anchor: 'end' }
                });
            } else if (currentTab === 'leadTimes') {
                datasets.push({
                    type: 'bar',
                    label: 'Lead Time',
                    data: leadData,
                    backgroundColor: '#0033a0',
                    datalabels: { align: 'top', anchor: 'end' }
                });
            } else if (currentTab === 'priceEscalation') {
                datasets.push({
                    type: 'bar',
                    label: 'Price Variance',
                    data: varData,
                    backgroundColor: '#0033a0',
                    datalabels: { align: 'top', anchor: 'end' }
                });
            }

            // Dynamic formatters for Y-axis and Tooltips based on the active tab
            let yAxisCallback = function(value) { return value; };
            let tooltipCallback = function(context) { return context.dataset.label + ': ' + context.parsed.y; };

            if (currentTab === 'unitPricing') {
                yAxisCallback = function(value) { return '$' + value.toLocaleString(); };
                tooltipCallback = function(context) { return context.dataset.label + ': $' + context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); };
            } else if (currentTab === 'priceEscalation') {
                yAxisCallback = function(value) { return value + '%'; };
                tooltipCallback = function(context) { return context.dataset.label + ': ' + context.parsed.y + '%'; };
            } else if (currentTab === 'leadTimes') {
                tooltipCallback = function(context) { return context.dataset.label + ': ' + context.parsed.y + ' Weeks'; };
            }

            // Custom plugin to draw the light gray connector stem between low and high ranges
            const stemPlugin = {
                id: 'stemPlugin',
                beforeDatasetsDraw(chart) {
                    if (currentTab !== 'unitPricing') return;
                    const metaLow = chart.getDatasetMeta(0);
                    const metaHigh = chart.getDatasetMeta(1);
                    if (!metaLow || !metaHigh || metaLow.hidden || metaHigh.hidden) return;

                    const ctx = chart.ctx;
                    ctx.save();
                    ctx.strokeStyle = '#d1d5db'; // Light gray
                    ctx.lineWidth = 3;

                    metaLow.data.forEach((point, index) => {
                        const highPoint = metaHigh.data[index];
                        if (point && highPoint && !point.skip && !highPoint.skip) {
                            ctx.beginPath();
                            ctx.moveTo(point.x, point.y);
                            ctx.lineTo(highPoint.x, highPoint.y);
                            ctx.stroke();
                        }
                    });
                    ctx.restore();
                }
            };

            myChart = new Chart(ctx, {
                type: 'bar', // Base type, overridden by unitPricing datasets
                data: { labels, datasets },
                plugins: [ChartDataLabels, stemPlugin],
                options: {
                    layout: {
                        padding: { top: 35, bottom: 20 } // Prevents datalabels from clipping off the canvas edges
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        datalabels: {
                            color: '#4b5563',
                            font: { weight: 'bold', size: 11 },
                            formatter: function(value, context) {
                                if (currentTab === 'unitPricing') return '$' + value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                                if (currentTab === 'priceEscalation') return value + '%';
                                if (currentTab === 'leadTimes') return value + ' Wks';
                            }
                        },
                        legend: { display: false }, // Legend removed as requested
                        tooltip: {
                            callbacks: {
                                label: tooltipCallback
                            }
                        }
                    },
                    scales: {
                        x: {
                            offset: true // Fixes the issue where outer data points hugged the very edge of the chart
                        },
                        y: { 
                            beginAtZero: true,
                            ticks: {
                                callback: yAxisCallback
                            }
                        }
                    }
                }
            });
        }

        function renderTable(dataArray) {
            const container = document.getElementById('data-container');
            
            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = "<p class='no-data'>No submissions match your current filters.</p>";
                return;
            }

            let allKeys = new Set();
            dataArray.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));
            let headers = Array.from(allKeys);
            
            const preferredOrder = ['TIMESTAMP', 'COMPANY', 'COMPANY NAME', 'REGION', 'QUARTER', 'BID PACKAGE', 'ITEM', 'UNIT OF MEASURE'];
            headers.sort((a, b) => {
               let indexA = preferredOrder.indexOf(a.toUpperCase());
               let indexB = preferredOrder.indexOf(b.toUpperCase());
               if (indexA === -1) indexA = 999;
               if (indexB === -1) indexB = 999;
               return indexA - indexB;
            });

            let html = `<table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            
            dataArray.forEach(row => {
                // Find the unit of measure for this specific row to append to prices
                let rowUOM = '';
                const uomKey = Object.keys(row).find(k => k.toUpperCase().includes('UNIT OF MEASURE') || k.toUpperCase() === 'UOM');
                if (uomKey && row[uomKey]) {
                    rowUOM = row[uomKey];
                }

                html += `<tr>`;
                headers.forEach(h => {
                    let val = row[h] !== undefined ? row[h] : '';
                    
                    if (val !== '') {
                        const hUpper = h.toUpperCase();
                        
                        // Clean the value of non-numeric characters for calculation, avoiding structural columns
                        const skipFormatCols = ['TIMESTAMP', 'QUARTER', 'COMPANY', 'REGION', 'BID PACKAGE', 'ITEM', 'UNIT OF MEASURE'];
                        
                        if (!skipFormatCols.includes(hUpper)) {
                            let cleanVal = parseFloat(String(val).replace(/[^0-9.-]+/g, ""));
                            
                            if (!isNaN(cleanVal)) {
                                // Checking for Variance/Escalation FIRST prevents "Price Variance" from formatting as currency
                                if (hUpper.includes('VARIANCE') || hUpper.includes('ESCALATION')) {
                                    if (Math.abs(cleanVal) <= 1 && cleanVal !== 0 && !String(val).includes('%')) {
                                        cleanVal = cleanVal * 100;
                                    }
                                    val = parseFloat(cleanVal.toFixed(2)) + '%';
                                } else if (hUpper.includes('PRICE') || hUpper.includes('COST') || hUpper.includes('RANGE')) {
                                    val = '$' + cleanVal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                                    if (rowUOM) val += '/' + rowUOM; // Append the UoM suffix
                                } else if (hUpper.includes('LEAD') || hUpper.includes('TIME')) {
                                    val = cleanVal + ' Weeks';
                                }
                            }
                        }
                    }
                    
                    html += `<td>${val}</td>`;
                });
                html += `</tr>`;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
