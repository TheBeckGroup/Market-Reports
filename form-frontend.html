<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Submission Form</title>
    <!-- Favicon link -->
    <link rel="icon" type="image/png" href="becklogo64.png">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px; background-color: #f3f4f6; color: #4b5563; }
        .container { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; position: relative; }
        
        .btn-back { display: inline-flex; align-items: center; color: #6b7280; text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 15px; transition: color 0.2s; }
        .btn-back:hover { color: #0033a0; }

        .header-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; }
        .header-bar h2 { margin: 0; color: #0033a0; font-size: 24px; }
        .header-bar img { height: 50px; width: auto; object-fit: contain; }
        
        .section-container { margin-bottom: 40px; }
        .section-container h3 { color: #0033a0; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 15px; }
        
        .instruction-note { font-size: 13px; font-style: italic; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }
        
        .form-group { margin-bottom: 20px; }
        .form-group.flex-row { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #f3f4f6; padding-bottom: 15px; position: relative; }
        .form-group.flex-row:last-child { border-bottom: none; }
        
        .details { flex: 1; min-width: 0; }
        .input-area { flex: none; width: 160px; }
        .input-area.double { flex: none; width: 320px; display: flex; gap: 10px; }
        
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: #0033a0; outline: none; box-shadow: 0 0 0 2px rgba(0,51,160,0.1); }
        
        /* Hide number input spinners (arrows) */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .input-group { display: flex; align-items: center; background: #fff; border: 1px solid #d1d5db; border-radius: 4px; overflow: hidden; margin-top: 5px; width: 100%; }
        .input-group-addon { background: #f3f4f6; padding: 10px 12px; color: #6b7280; font-size: 13px; font-weight: bold; white-space: nowrap; }
        .input-group-addon.prefix { border-right: 1px solid #d1d5db; }
        .input-group-addon.suffix { border-left: 1px solid #d1d5db; }
        .input-group input { border: none !important; border-radius: 0 !important; margin-top: 0 !important; flex: 1; min-width: 0; outline: none; padding: 8px; box-shadow: none !important; }
        
        button { background-color: #0033a0; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; font-weight: bold; }
        button:hover { background-color: #002270; }
        
        .btn-add { background-color: #f3f4f6; color: #0033a0; border: 1px dashed #0033a0; padding: 8px 16px; font-size: 13px; margin-top: 5px; }
        .btn-add:hover { background-color: #e5e7eb; }

        .btn-delete { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 0 5px; position: absolute; right: -30px; top: 50%; transform: translateY(-50%); transition: transform 0.2s; line-height: 1; }
        .btn-delete:hover { transform: translateY(-50%) scale(1.2); }
        
        .loading { font-style: italic; color: #6b7280; padding: 20px; text-align: center; }
        #submit-btn { margin-top: 20px; width: 100%; font-size: 18px; padding: 15px; }

        .custom-item-row { background: #f9fafb; padding: 15px; border-radius: 6px; margin-bottom: 10px; }

        @media (max-width: 600px) {
            .form-group.flex-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .input-area, .input-area.double { width: 100%; }
            .btn-delete { right: 0; top: 10px; transform: none; }
            .btn-delete:hover { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">← Back to Selection</a>
        <div class="header-bar">
            <div style="flex:1">
                <h2>Market Condition Pricing</h2>
                <p id="package-name" style="margin: 5px 0 0 0; font-weight: bold; color: #4b5563;"></p>
            </div>
            <img src="becklogo.png" alt="Company Logo">
        </div>

        <form id="pricing-form">
            <input type="hidden" id="hidden-package" name="bidPackage">
            <input type="hidden" id="hidden-quarter" name="quarter">

            <div class="form-group" style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 250px;">
                    <label>Subcontractor Company Name *</label>
                    <input type="text" name="companyName" required>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Region *</label>
                    <select name="region" required>
                        <option value="" disabled selected>-- Select Region --</option>
                        <option value="Tampa/West Florida">Tampa/West Florida</option>
                        <option value="Miami/Ft. Lauderdale">Miami/Ft. Lauderdale</option>
                        <option value="Orlando/Central Florida">Orlando/Central Florida</option>
                    </select>
                </div>
            </div>

            <div id="form-content" class="loading">Loading bid package items...</div>
            <div id="submit-container"></div>
        </form>
    </div>

    <script>
        const GAS_DB_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxmdnYzBC-mfx1IpGiDUdpAfELNVnJL0oZ5cYKkbxoB_z-IlRBVBLcNyPlAJXTBjJXX/exec';
        let customCounts = { unit: 0, lead: 0, escalation: 0, sentiment: 0 };

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const packageName = urlParams.get('package');

            if (!packageName) {
                document.getElementById('form-content').innerHTML = '<p style="color:red;">Error: No Bid Package selected. Please return to the selection page.</p>';
                return;
            }

            document.getElementById('package-name').textContent = "Package: " + packageName;
            document.getElementById('hidden-package').value = packageName;
            document.getElementById('hidden-quarter').value = getCurrentQuarter();

            try {
                const response = await fetch(`${GAS_DB_WEB_APP_URL}?package=${encodeURIComponent(packageName)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                renderFormFields(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('form-content').innerHTML = '<p style="color:red;">Failed to load items. Error: ' + error.message + '</p>';
            }
        });

        function renderFormFields(data) {
            const container = document.getElementById('form-content');
            container.innerHTML = "";
            container.classList.remove('loading');

            let html = "";

            // SECTION 1: UNIT PRICING
            html += `<div class="section-container">`;
            html += `<h3>Current Unit Pricing</h3>`;
            if (data.unitPricing.note) {
                html += `<div class="instruction-note">${data.unitPricing.note}</div>`;
            }
            if (data.unitPricing.items.length === 0) {
                html += `<p>No unit pricing items found for this package.</p>`;
            } else {
                data.unitPricing.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area double">
                            <div class="input-group">
                                <span class="input-group-addon prefix">$</span>
                                <input type="number" step="0.01" name="unitPriceLow_${i}">
                            </div>
                            <div class="input-group">
                                <span class="input-group-addon prefix">$</span>
                                <input type="number" step="0.01" name="unitPriceHigh_${i}">
                                <span class="input-group-addon suffix">/ ${row['UNIT OF MEASURE'] || 'UNIT'}</span>
                            </div>
                            <input type="hidden" name="unitItem_${i}" value="${row['ITEM']}">
                            <input type="hidden" name="unitOriginalUOM_${i}" value="${row['UNIT OF MEASURE']}">
                            <input type="hidden" name="unitPackage_${i}" value="${row['BID PACKAGE']}">
                        </div>
                    </div>`;
                });
            }
            html += `<div id="custom-unit-items"></div>`;
            html += `<button type="button" class="btn-add" onclick="addCustomItem('unit')">+ Add Custom Item</button>`;
            html += `</div>`;

            // SECTION 2: LEAD TIMES
            html += `<div class="section-container">`;
            html += `<h3>Material Lead Times</h3>`;
            if (data.leadTimes.note) {
                html += `<div class="instruction-note">${data.leadTimes.note}</div>`;
            }
            if (data.leadTimes.items.length === 0) {
                html += `<p>No lead time items found.</p>`;
            } else {
                data.leadTimes.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <input type="number" name="leadTime_${i}">
                                <span class="input-group-addon suffix">weeks</span>
                            </div>
                            <input type="hidden" name="leadItem_${i}" value="${row['ITEM']}">
                            <input type="hidden" name="leadPackage_${i}" value="${row['BID PACKAGE']}">
                        </div>
                    </div>`;
                });
            }
            html += `<div id="custom-lead-items"></div>`;
            html += `<button type="button" class="btn-add" onclick="addCustomItem('lead')">+ Add Custom Item</button>`;
            html += `</div>`;

            // SECTION 3: PRICE ESCALATION
            html += `<div class="section-container">`;
            html += `<h3>Projected Price Variance</h3>`;
            if (data.priceEscalation.note) {
                html += `<div class="instruction-note">${data.priceEscalation.note}</div>`;
            } else {
                html += `<p style="font-size: 13px; color: #6b7280; margin-bottom: 15px;">Projected percentage variance for next quarter.</p>`;
            }
            
            if (data.priceEscalation.items.length === 0) {
                html += `<p>No escalation items found.</p>`;
            } else {
                data.priceEscalation.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <input type="number" step="0.01" name="escalation_${i}">
                                <span class="input-group-addon suffix">%</span>
                            </div>
                            <input type="hidden" name="escalationItem_${i}" value="${row['ITEM']}">
                            <input type="hidden" name="escalationPackage_${i}" value="${row['BID PACKAGE']}">
                        </div>
                    </div>`;
                });
            }
            html += `<div id="custom-escalation-items"></div>`;
            html += `<button type="button" class="btn-add" onclick="addCustomItem('escalation')">+ Add Custom Item</button>`;
            html += `</div>`;

            // SECTION 4: MARKET SENTIMENT (Sleek Block Layout)
            html += `<div class="section-container">`;
            html += `<h3>Market Sentiment</h3>`;
            if (data.marketSentiment.note) {
                html += `<div class="instruction-note">${data.marketSentiment.note}</div>`;
            } else {
                html += `<p style="font-size: 13px; color: #6b7280; margin-bottom: 15px;">Please share your thoughts on market conditions, supply chain issues, or general sentiment.</p>`;
            }
            
            if (!data.marketSentiment || data.marketSentiment.items.length === 0) {
                html += `<p>No sentiment topics listed.</p>`;
            } else {
                data.marketSentiment.items.forEach((row, i) => {
                    html += `
                    <div class="form-group" style="background: #fff; padding: 18px; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.02);">
                        <label style="display: block; font-size: 15px; color: #111827; margin-bottom: 12px; font-weight: 600;">${row['ITEM']}</label>
                        <textarea name="sentiment_${i}" placeholder="Enter your response here..." style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; resize: vertical; min-height: 80px; font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box;"></textarea>
                        <input type="hidden" name="sentimentItem_${i}" value="${row['ITEM']}">
                        <input type="hidden" name="sentimentPackage_${i}" value="${row['BID PACKAGE']}">
                    </div>`;
                });
            }
            html += `<div id="custom-sentiment-items"></div>`;
            html += `<button type="button" class="btn-add" onclick="addCustomItem('sentiment')">+ Add Custom Quote/Comment</button>`;
            html += `</div>`;

            container.innerHTML = html;
            document.getElementById('submit-container').innerHTML = `<button type="submit" id="submit-btn">Submit Pricing</button>`;
        }

        function addCustomItem(type) {
            const container = document.getElementById(`custom-${type}-items`);
            let html = '';
            let count = customCounts[type]++;
            
            if (type === 'unit') {
                html = `
                <div class="form-group flex-row custom-item-row" style="border-left: 3px solid #0033a0;">
                    <button type="button" class="btn-delete" onclick="this.closest('.custom-item-row').remove()">✖</button>
                    <div class="details" style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="text" name="customUnitName_${count}" placeholder="Custom Item Description" style="flex: 2;">
                        <input type="text" name="customUnitUOM_${count}" placeholder="UOM (e.g. LS, SF)" style="flex: 1;">
                    </div>
                    <div class="input-area double">
                        <div class="input-group">
                            <span class="input-group-addon prefix">$</span>
                            <input type="number" step="0.01" name="customUnitPriceLow_${count}">
                        </div>
                        <div class="input-group">
                            <span class="input-group-addon prefix">$</span>
                            <input type="number" step="0.01" name="customUnitPriceHigh_${count}">
                        </div>
                    </div>
                </div>`;
            } else if (type === 'lead') {
                html = `
                <div class="form-group flex-row custom-item-row" style="border-left: 3px solid #0033a0;">
                    <button type="button" class="btn-delete" onclick="this.closest('.custom-item-row').remove()">✖</button>
                    <div class="details" style="margin-top: 5px;">
                        <input type="text" name="customLeadName_${count}" placeholder="Custom Lead Time Description">
                    </div>
                    <div class="input-area">
                        <div class="input-group">
                            <input type="number" name="customLeadTime_${count}">
                            <span class="input-group-addon suffix">weeks</span>
                        </div>
                    </div>
                </div>`;
            } else if (type === 'escalation') {
                html = `
                <div class="form-group flex-row custom-item-row" style="border-left: 3px solid #0033a0;">
                    <button type="button" class="btn-delete" onclick="this.closest('.custom-item-row').remove()">✖</button>
                    <div class="details" style="margin-top: 5px;">
                        <input type="text" name="customEscalationName_${count}" placeholder="Custom Escalation Description">
                    </div>
                    <div class="input-area">
                        <div class="input-group">
                            <input type="number" step="0.01" name="customEscalation_${count}">
                            <span class="input-group-addon suffix">%</span>
                        </div>
                    </div>
                </div>`;
            } else if (type === 'sentiment') {
                html = `
                <div class="form-group custom-item-row" style="border-left: 3px solid #0033a0; padding: 18px; background: #f9fafb; border-radius: 6px; margin-bottom: 15px; position: relative;">
                    <button type="button" class="btn-delete" onclick="this.closest('.custom-item-row').remove()" style="position: absolute; top: 10px; right: 10px; transform: none;">✖</button>
                    <label style="display: block; font-size: 12px; color: #6b7280; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;">Custom Topic / Question</label>
                    <input type="text" name="customSentimentName_${count}" placeholder="E.g., Supply chain delays..." style="margin-bottom: 12px; width: calc(100% - 30px); display: block;">
                    <textarea name="customSentiment_${count}" placeholder="Enter comments here..." style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; resize: vertical; min-height: 80px; font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box;"></textarea>
                </div>`;
            }
            container.insertAdjacentHTML('beforeend', html);
        }

        function getCurrentQuarter() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const q = Math.floor(month / 3) + 1;
            return `Q${q} ${year}`;
        }

        document.getElementById('pricing-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Submitting...";

            const formData = new FormData(e.target);
            const data = {
                companyName: formData.get('companyName'),
                region: formData.get('region'),
                quarter: formData.get('quarter'),
                bidPackage: formData.get('bidPackage'),
                unitPricing: [],
                leadTimes: [],
                priceEscalation: [],
                marketSentiment: []
            };

            // Parse Form Data into JSON structure
            for (let [key, value] of formData.entries()) {
                if (!value) continue;

                // Existing Items
                if (key.startsWith('unitPriceLow_')) {
                    const idx = key.split('_')[1];
                    data.unitPricing.push({
                        'BID PACKAGE': formData.get(`unitPackage_${idx}`),
                        'ITEM': formData.get(`unitItem_${idx}`),
                        'UNIT OF MEASURE': formData.get(`unitOriginalUOM_${idx}`),
                        'LOW RANGE': value,
                        'HIGH RANGE': formData.get(`unitPriceHigh_${idx}`) || value,
                        'SUBMITTED PRICE': value 
                    });
                } else if (key.startsWith('leadTime_')) {
                    const idx = key.split('_')[1];
                    data.leadTimes.push({
                        'BID PACKAGE': formData.get(`leadPackage_${idx}`),
                        'ITEM': formData.get(`leadItem_${idx}`),
                        'SUBMITTED LEAD TIME': value
                    });
                } else if (key.startsWith('escalation_')) {
                    const idx = key.split('_')[1];
                    data.priceEscalation.push({
                        'BID PACKAGE': formData.get(`escalationPackage_${idx}`),
                        'ITEM': formData.get(`escalationItem_${idx}`),
                        'SUBMITTED VARIANCE': value
                    });
                } else if (key.startsWith('sentiment_')) {
                    const idx = key.split('_')[1];
                    data.marketSentiment.push({
                        'BID PACKAGE': formData.get(`sentimentPackage_${idx}`),
                        'ITEM': formData.get(`sentimentItem_${idx}`),
                        'RESPONSE': value
                    });
                }
                // Custom Items dynamically pushed to their respective sections
                else if (key.startsWith('customUnitName_')) {
                    const idx = key.split('_')[1];
                    data.unitPricing.push({
                        'BID PACKAGE': data.bidPackage,
                        'ITEM': value + " (Custom)",
                        'UNIT OF MEASURE': formData.get(`customUnitUOM_${idx}`) || "LS",
                        'LOW RANGE': formData.get(`customUnitPriceLow_${idx}`),
                        'HIGH RANGE': formData.get(`customUnitPriceHigh_${idx}`) || formData.get(`customUnitPriceLow_${idx}`),
                        'SUBMITTED PRICE': formData.get(`customUnitPriceLow_${idx}`)
                    });
                } else if (key.startsWith('customLeadName_')) {
                    const idx = key.split('_')[1];
                    data.leadTimes.push({
                        'BID PACKAGE': data.bidPackage,
                        'ITEM': value + " (Custom)",
                        'SUBMITTED LEAD TIME': formData.get(`customLeadTime_${idx}`)
                    });
                } else if (key.startsWith('customEscalationName_')) {
                    const idx = key.split('_')[1];
                    data.priceEscalation.push({
                        'BID PACKAGE': data.bidPackage,
                        'ITEM': value + " (Custom)",
                        'SUBMITTED VARIANCE': formData.get(`customEscalation_${idx}`)
                    });
                } else if (key.startsWith('customSentimentName_')) {
                    const idx = key.split('_')[1];
                    data.marketSentiment.push({
                        'BID PACKAGE': data.bidPackage,
                        'ITEM': value + " (Custom)",
                        'RESPONSE': formData.get(`customSentiment_${idx}`)
                    });
                }
            }

            try {
                const response = await fetch(GAS_DB_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(data)
                });
                
                // Since no-cors hides the response, we assume success if no error is thrown
                document.body.innerHTML = `
                <div class="container" style="text-align: center; padding: 60px 20px;">
                    <img src="becklogo.png" alt="Beck Logo" style="height: 60px; margin-bottom: 20px;">
                    <h2 style="color: #0033a0;">Submission Successful</h2>
                    <p>Thank you for submitting your market pricing for <strong>${data.bidPackage}</strong>.</p>
                    <p style="color: #6b7280;">You can now close this window or return to the landing page to select another package.</p>
                    <a href="index.html" style="display: inline-block; margin-top: 20px; background-color: #0033a0; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold;">Return to Selection</a>
                </div>`;
            } catch (error) {
                console.error('Submission error:', error);
                alert("Submission failed. Please check your connection and try again.");
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };
    </script>
</body>
</html>
