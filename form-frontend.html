<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beck - Market Conditions Questionnaire</title>
    <!-- Favicon link -->
    <link rel="icon" type="image/png" href="becklogo64.png">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; background-color: #f3f4f6; color: #4b5563; }
        .container { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; padding: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 4px; }
        input[type="text"], input[type="number"], input[type="email"], select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; color: #4b5563; font-family: inherit; background-color: #fff; }
        button { background-color: #0033a0; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 20px; transition: background-color 0.2s; }
        button:hover { background-color: #002270; }
        .btn-add { background-color: transparent; color: #0033a0; border: 1px dashed #0033a0; padding: 8px 16px; font-size: 14px; border-radius: 4px; cursor: pointer; width: auto; margin-top: 5px; margin-bottom: 15px; display: inline-block; transition: background-color 0.2s; }
        .btn-add:hover { background-color: #f9fafb; }
        h2, h3 { color: #0033a0; }
        hr { border: 0; border-top: 1px solid #e5e7eb; margin: 30px 0; }
        .loading { text-align: center; font-size: 18px; color: #6b7280; }
        .header-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .header-bar h2 { margin: 0; }
        .header-bar img { height: 50px; width: auto; object-fit: contain; margin-left: 20px; }
        
        /* Flexbox classes to put inputs on the right side */
        .flex-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .flex-row .details { flex: 1; }
        .flex-row .input-area { flex: 0 1 150px; } /* Input width restricted to 150px for numbers */
        
        /* On small phone screens, stack them normally so they aren't crushed */
        @media (max-width: 600px) {
            .flex-row { flex-direction: column; align-items: stretch; gap: 5px; }
            .flex-row .input-area { flex: auto; }
        }
        
        /* Input Group for sleek grey prefix/suffix boxes */
        .input-group { display: flex; align-items: stretch; width: 100%; border: 1px solid #d1d5db; border-radius: 4px; overflow: hidden; margin-top: 5px; background: #fff; }
        .input-group:focus-within { border-color: #0033a0; outline: 1px solid #0033a0; }
        .input-group-addon { background-color: #e5e7eb; color: #4b5563; padding: 8px 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; white-space: nowrap; }
        .input-group-addon.prefix { border-right: 1px solid #d1d5db; }
        .input-group-addon.suffix { border-left: 1px solid #d1d5db; }
        .input-group input { border: none !important; border-radius: 0 !important; margin-top: 0 !important; flex: 1; min-width: 0; outline: none; padding: 8px; box-shadow: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h2 id="form-title">Loading Form...</h2>
            <img src="becklogo.png" alt="Company Logo">
        </div>
        <div id="form-container">
            <p class="loading">Fetching items from the database...</p>
        </div>
    </div>

    <script>
        // === IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URLS HERE ===
        const GAS_DB_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxmdnYzBC-mfx1IpGiDUdpAfELNVnJL0oZ5cYKkbxoB_z-IlRBVBLcNyPlAJXTBjJXX/exec'; // The Reader (doGet)
        const GAS_FORM_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzRLhXtHZmk7seDx0jHFsjE3sG9JKII8VXVbxHhCfdArSjhIyiTVedbv7NuT1Xqfl45/exec';   // The Writer (doPost)

        let currentPackage = "";
        let fetchedData = null;
        let customItemCount = 0;

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentPackage = urlParams.get('package');

            if (!currentPackage) {
                document.getElementById('form-container').innerHTML = "<p>Error: No Bid Package selected. Please return to the <a href='index.html'>Landing Page</a>.</p>";
                document.getElementById('form-title').innerText = "Error";
                return;
            }

            document.getElementById('form-title').innerText = `${currentPackage} - Pricing Form`;
            loadFormData(currentPackage);
        });

        async function loadFormData(bidPackage) {
            try {
                const response = await fetch(`${GAS_DB_WEB_APP_URL}?package=${encodeURIComponent(bidPackage)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                fetchedData = data;
                renderForm(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('form-container').innerHTML = `<p style="color:red;">Failed to connect to the database. Error: ${error.message}</p>`;
            }
        }

        function renderForm(data) {
            let html = `<form id="subcontractor-form">`;
            customItemCount = 0; // Reset counter on load

            // Basic Subcontractor Info
            html += `<h3>Subcontractor Information</h3>`;
            html += `
            <div class="form-group">
                <label><strong>Company Name</strong></label>
                <input type="text" name="companyName" required>
            </div>
            <div class="form-group">
                <label><strong>Region</strong></label>
                <select name="region" required>
                    <option value="" disabled selected>-- Select a Region --</option>
                    <option value="Tampa/West Florida">Tampa/West Florida</option>
                    <option value="Orlando/Central Florida">Orlando/Central Florida</option>
                    <option value="Miami/Ft. Lauderdale">Miami/Ft. Lauderdale</option>
                </select>
            </div>`;

            // SECTION 1: UNIT PRICING
            html += `<hr><h3>Unit Pricing</h3>`;
            
            // Add dynamic note for Unit Pricing
            if (data.unitPricing.note) html += `<p style="margin-top: -10px; margin-bottom: 20px; font-style: italic; color: #4b5563;">${data.unitPricing.note}</p>`;

            if (data.unitPricing.items.length === 0) {
                html += `<p>No unit pricing items found.</p>`;
            } else {
                data.unitPricing.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <span class="input-group-addon prefix">$</span>
                                <input type="number" step="0.01" name="unitPrice_${i}" required>
                                <span class="input-group-addon suffix">/ ${row['UNIT OF MEASURE']}</span>
                            </div>
                            <input type="hidden" name="unitItem_${i}" value="${row['ITEM']}">
                        </div>
                    </div>`;
                });
            }
            
            // Custom Add Items Container
            html += `<div id="custom-unit-items"></div>`;
            html += `<button type="button" class="btn-add" onclick="addCustomUnitItem()">+ Add Custom Item</button>`;

            // SECTION 2: LEAD TIMES
            html += `<hr><h3>Lead Times</h3>`;
            
            // Add dynamic note for Lead Times
            if (data.leadTimes.note) html += `<p style="margin-top: -10px; margin-bottom: 20px; font-style: italic; color: #4b5563;">${data.leadTimes.note}</p>`;

            if (data.leadTimes.items.length === 0) {
                html += `<p>No lead time items found.</p>`;
            } else {
                data.leadTimes.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <input type="number" name="leadTime_${i}" required>
                                <span class="input-group-addon suffix">weeks</span>
                            </div>
                            <input type="hidden" name="leadItem_${i}" value="${row['ITEM']}">
                        </div>
                    </div>`;
                });
            }

            // SECTION 3: PRICE ESCALATION
            html += `<hr><h3>Price Escalation</h3>`;
            
            // Add dynamic note for Price Escalation
            if (data.priceEscalation.note) html += `<p style="margin-top: -10px; margin-bottom: 20px; font-style: italic; color: #4b5563;">${data.priceEscalation.note}</p>`;

            if (data.priceEscalation.items.length === 0) {
                html += `<p>No escalation items found.</p>`;
            } else {
                data.priceEscalation.items.forEach((row, i) => {
                    html += `
                    <div class="form-group flex-row">
                        <div class="details">
                            <label><strong>${row['ITEM']}</strong></label>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <input type="number" step="0.01" name="escalation_${i}" required>
                                <span class="input-group-addon suffix">%</span>
                            </div>
                            <input type="hidden" name="escalationItem_${i}" value="${row['ITEM']}">
                        </div>
                    </div>`;
                });
            }

            html += `<button type="submit" id="submit-btn">Submit Pricing</button>`;
            html += `</form>`;

            document.getElementById('form-container').innerHTML = html;

            // Add Event Listener for Submission
            document.getElementById('subcontractor-form').addEventListener('submit', handleFormSubmit);
        }

        // Logic to generate custom input rows
        function addCustomUnitItem() {
            const container = document.getElementById('custom-unit-items');
            const html = `
            <div class="form-group flex-row" id="custom-item-${customItemCount}" style="border-left: 3px solid #0033a0;">
                <div class="details" style="display: flex; gap: 10px;">
                    <input type="text" name="customItemName_${customItemCount}" placeholder="Custom Item Description" required style="flex: 2; margin-top: 0;">
                    <input type="text" name="customItemUOM_${customItemCount}" placeholder="UOM (e.g. LS, SF)" required style="flex: 1; margin-top: 0;">
                </div>
                <div class="input-area">
                    <div class="input-group" style="margin-top: 0;">
                        <span class="input-group-addon prefix">$</span>
                        <input type="number" step="0.01" name="customUnitPrice_${customItemCount}" placeholder="Price" required>
                    </div>
                </div>
            </div>`;
            container.insertAdjacentHTML('beforeend', html);
            customItemCount++;
        }

        function getCurrentQuarter() {
            const date = new Date();
            const quarter = Math.floor((date.getMonth() + 3) / 3);
            return `Q${quarter} ${date.getFullYear()}`;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Submitting...";
            btn.disabled = true;

            // Gather all data from the form
            const formData = new FormData(e.target);
            
            // Build a structured payload mapping answers directly back to their original row data
            const submissionData = {
                companyName: formData.get('companyName'),
                region: formData.get('region'),
                quarter: getCurrentQuarter(),
                bidPackage: currentPackage,
                unitPricing: [],
                leadTimes: [],
                priceEscalation: []
            };

            // Map Unit Pricing answers
            if (fetchedData && fetchedData.unitPricing && fetchedData.unitPricing.items) {
                fetchedData.unitPricing.items.forEach((row, i) => {
                    const val = formData.get(`unitPrice_${i}`);
                    if (val) submissionData.unitPricing.push({ ...row, 'SUBMITTED PRICE': val });
                });
            }

            // Map Custom Unit Pricing answers added by the subcontractor
            for (let i = 0; i < customItemCount; i++) {
                const itemName = formData.get(`customItemName_${i}`);
                const uom = formData.get(`customItemUOM_${i}`);
                const price = formData.get(`customUnitPrice_${i}`);
                
                if (itemName && uom && price) {
                    submissionData.unitPricing.push({
                        'ITEM': itemName,
                        'UNIT OF MEASURE': uom,
                        'SUBMITTED PRICE': price,
                        'BID PACKAGE': currentPackage
                    });
                }
            }

            // Map Lead Times answers
            if (fetchedData && fetchedData.leadTimes && fetchedData.leadTimes.items) {
                fetchedData.leadTimes.items.forEach((row, i) => {
                    const val = formData.get(`leadTime_${i}`);
                    if (val) submissionData.leadTimes.push({ ...row, 'SUBMITTED LEAD TIME': val });
                });
            }

            // Map Price Escalation answers
            if (fetchedData && fetchedData.priceEscalation && fetchedData.priceEscalation.items) {
                fetchedData.priceEscalation.items.forEach((row, i) => {
                    const val = formData.get(`escalation_${i}`);
                    if (val) submissionData.priceEscalation.push({ ...row, 'SUBMITTED VARIANCE': val });
                });
            }

            try {
                const response = await fetch(GAS_FORM_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(submissionData)
                });
                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('form-container').innerHTML = `
                        <div style="text-align: center; color: #4b5563; margin-top: 20px;">
                            <h3 style="color: #0033a0;">Success!</h3>
                            <p>Your pricing for the ${currentPackage} package has been submitted.</p>
                            <a href="index.html" style="color: #0033a0; font-weight: bold; text-decoration: none;">Return to Home</a>
                        </div>`;
                } else {
                    throw new Error(result.message || "Unknown error");
                }
            } catch (error) {
                alert("Error submitting form: " + error.message);
                btn.innerText = "Submit Pricing";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
